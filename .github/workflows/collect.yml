name: Collect Daily Forecast

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch and save forecast
        run: node scripts/collect-forecast.js
      - name: Commit snapshot
        run: |
          git config user.name "forecast-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/snapshots/
          git diff --staged --quiet || git commit -m "forecast snapshot $(date -u +%Y-%m-%d)"
          git push